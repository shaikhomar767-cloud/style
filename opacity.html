<html>
    <head>
        <title>opacity</title>
        <style>
            div{
                background-color: rgb(0, 221, 255);
                padding: 1px;
            }
            div.frist{
                opacity: 0.1;
            }
            div.second{
                opacity: 0.3;
            }
            div.third{
                opacity: 0.6;
            }
        </style>
    </head>
    <body>
        <h1>opacity</h1>
        <p>this how this property looks</p>
        <div class="frist"><p>opacity 0.1%</p></div>
        <div class="second"><p>opacity 0.3%</p></div>
        <div class="third"><p>opacity 0.6%</p></div>
        <div><p>opacity 1</p></div>
    </body>
</html>
